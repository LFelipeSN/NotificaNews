name: Script Diário

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  rodar:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Executar script
        run: python main.py
        env:
          URL_SLACK: ${{ secrets.URL_SLACK }}
